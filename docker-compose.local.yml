version: "3.5"

networks:
  iced-latte-network:
    name: iced-latte-network
    attachable: true

volumes:
  pg_data:

services:
  iced-latte-frontend:
    image: 'zufarexplainedit/iced-latte-frontend:latest'
    container_name: iced-latte-frontend
    build:
      context: .
      dockerfile: Dockerfile.local
    env_file:
      - .env.local
    ports:
      - '3000:3000'
    networks:
      - iced-latte-network
    depends_on:
      iced-latte-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: on-failure

  iced-latte-backend:
    image: 'zufarexplainedit/iced-latte-backend:latest'
    container_name: iced-latte-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      APP_SERVER_PORT: 8083
      APP_JWT_SECRET: ${APP_JWT_SECRET:-local_jwt_secret_placeholder}
      APP_JWT_REFRESH_SECRET: ${APP_JWT_REFRESH_SECRET:-local_jwt_refresh_secret_placeholder}
      DATASOURCE_PORT: 5432
      DATASOURCE_NAME: testdb
      DATASOURCE_USERNAME: postgres
      DATASOURCE_PASSWORD: postgres
      DATASOURCE_HOST: iced-latte-postgresdb
      REDIS_HOST: iced-latte-redis
      REDIS_PORT: 6379
      AWS_ENABLED: false
      AWS_ACCESS_KEY: local
      AWS_SECRET_KEY: local
      AWS_REGION: eu-west-1
      AWS_PRODUCT_BUCKET: products
      AWS_USER_BUCKET: users
      AWS_DEFAULT_PRODUCT_IMAGES_PATH: ./products
      GOOGLE_AUTH_CLIENT_ID: local
      GOOGLE_AUTH_CLIENT_SECRET: local
      GOOGLE_AUTH_REDIRECT_URI: http://localhost:8083
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    ports:
      - '8083:8083'
    networks:
      - iced-latte-network
    depends_on:
      iced-latte-postgresdb:
        condition: service_healthy
      iced-latte-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: on-failure

  iced-latte-postgresdb:
    image: 'postgres:14.18'
    container_name: iced-latte-postgresdb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=testdb
    ports:
      - '5432:5432'
    networks:
      - iced-latte-network
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  iced-latte-redis:
    image: redis/redis-stack:7.2.0-v13
    container_name: iced-latte-redis
    networks:
      - iced-latte-network
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: on-failure
